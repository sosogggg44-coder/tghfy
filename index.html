<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRTICS — Live Stream Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      /* Indigo */
      --secondary: #8b5cf6;
      /* Violet */
      --accent: #f59e0b;
      /* Amber */
      --bg: #0f172a;
      /* Slate 900 */
      --card: rgba(30, 41, 59, 0.7);
      /* Slate 800 with transparency */
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
    }

    /* --- Navigation --- */
    nav {
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 20px;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, var(--muted));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-stats {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-badge {
      padding: 6px 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 10px #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: 0.5;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* --- Main Layout --- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      padding: 30px 40px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    /* --- Video Section --- */
    .video-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .video-frame {
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .video-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .video-info {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* --- Chat Section --- */
    .chat-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      position: sticky;
      top: 100px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h3 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-body::-webkit-scrollbar {
      width: 6px;
    }

    .chat-body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .message {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      animation: slideIn 0.3s ease-out;
      transition: transform 0.2s;
    }

    .message:hover {
      transform: translateX(5px);
      background: rgba(255, 255, 255, 0.05);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .msg-user {
      font-weight: 700;
      color: var(--primary);
    }

    .msg-time {
      color: var(--muted);
    }

    .msg-content {
      font-size: 14px;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .chat-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    .archive-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 12px;
      transition: all 0.2s;
    }

    .archive-link:hover {
      background: var(--primary);
      color: #fff;
    }

    .no-messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
    }

    .loader {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: 1fr;
      }

      .chat-card {
        height: 600px;
        position: relative;
        top: 0;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="brand">
      <div class="brand-logo">V</div>
      <span class="brand-name">VRTICS LIVE</span>
    </div>
    <div class="nav-stats">
      <div class="status-badge">
        <div class="status-dot"></div>
        LIVE SYNC ACTIVE
      </div>
      <a href="archive.html" class="archive-link">الأرشيف</a>
    </div>
  </nav>

  <main>
    <section class="video-container">
      <div class="video-frame">
        <iframe src="https://www.youtube.com/embed/6_9ZiuONXt0?autoplay=1" allowfullscreen></iframe>
      </div>
      <div class="video-header">
        <div>
          <h1 class="video-title">مركز عمليات البث المباشر</h1>
          <p class="video-info">تحديث لحظي لكافة التعليقات وحذف الرسائل من يوتيوب.</p>
        </div>
        <div class="status-badge"
          style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); color: var(--accent);">
          <span id="msg-count">0</span> رسائل مؤرشفة
        </div>
      </div>
    </section>

    <section class="chat-card">
      <div class="chat-header">
        <h3>✨ المحادثة المباشرة</h3>
        <span id="last-update" style="font-size: 11px; color: var(--muted);">جاري الاتصال...</span>
      </div>

      <div id="chatbox" class="chat-body">
        <div class="no-messages">
          <div class="loader"></div>
          <p>في انتظار البيانات المباشرة...</p>
        </div>
      </div>

      <div class="chat-footer">
        نظام التحقق العالي الدقة (Fortress V6) مفعّل
      </div>
    </section>
  </main>

  <script>
    const VIDEO_ID = "6_9ZiuONXt0";
    const PROXY = "https://api.allorigins.win/raw?url=";

    let nextCont = null;
    let apiKey = null;
    let clientVer = "2.20240301";
    let visitorData = "";
    let seenIds = new Set();
    let retryCount = 0;

    async function getYtConfig() {
      try {
        const url = encodeURIComponent(`https://www.youtube.com/watch?v=${VIDEO_ID}`);
        const res = await fetch(`${PROXY}${url}`);
        const html = await res.text();

        apiKey = html.match(/"INNERTUBE_API_KEY":"([^"]+)"/)?.[1];
        clientVer = html.match(/"clientVersion":"([^"]+)"/)?.[1] || "2.20240301";
        visitorData = html.match(/"visitorData":"([^"]+)"/)?.[1] || "";

        // Comprehensive continuation search
        const contMatch = html.match(/"continuation":"([^"]{50,})"/)?.[1] ||
          html.match(/"continuation":"([^"]+)"/)?.[1];

        if (contMatch) {
          nextCont = contMatch;
          return true;
        }
        return false;
      } catch (e) {
        console.error("Config Fetch Failed:", e);
        return false;
      }
    }

    function esc(t) {
      const p = document.createElement('p');
      p.textContent = t;
      return p.innerHTML;
    }

    function formatTime() {
      return new Date().toLocaleTimeString("ar-IQ", {
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true, timeZone: "Asia/Baghdad"
      });
    }

    async function fetchChat() {
      if (!apiKey || !nextCont) {
        const success = await getYtConfig();
        if (!success) {
          document.getElementById("last-update").innerText = "البحث عن بث مباشر...";
          return;
        }
      }

      const chatbox = document.getElementById("chatbox");
      const updText = document.getElementById("last-update");

      try {
        const apiAddr = `https://www.youtube.com/youtubei/v1/live_chat/get_live_chat?key=${apiKey}`;
        const body = {
          context: { client: { clientName: "WEB", clientVersion: clientVer, visitorData } },
          continuation: nextCont
        };

        const res = await fetch(`${PROXY}${encodeURIComponent(apiAddr)}`, {
          method: "POST",
          body: JSON.stringify(body)
        });

        const data = await res.json();
        const contObj = data.continuationContents?.liveChatContinuation;

        // Efficient continuation update
        const newCont = contObj?.continuations?.[0]?.invalidationContinuationData?.continuation ||
          contObj?.continuations?.[0]?.timedContinuationData?.continuation ||
          contObj?.continuations?.[0]?.liveChatReplayContinuationData?.continuation;

        if (newCont) nextCont = newCont;

        const actions = contObj?.actions || [];
        const isBottom = chatbox.scrollHeight - chatbox.scrollTop - chatbox.clientHeight < 120;
        let added = false;

        actions.forEach(a => {
          const item = a.addChatItemAction?.item?.liveChatTextMessageRenderer;
          if (item) {
            const mid = item.id;
            if (!seenIds.has(mid)) {
              seenIds.add(mid);
              if (chatbox.querySelector(".no-messages")) chatbox.innerHTML = "";

              const author = item.authorName?.simpleText || "User";
              const txt = item.message?.runs?.map(r => r.text).join("") || "";

              chatbox.insertAdjacentHTML("beforeend", `
                <div class="message" id="msg-${mid}">
                  <div class="msg-meta">
                    <span class="msg-user">${esc(author)}</span>
                    <span class="msg-time">${formatTime()}</span>
                  </div>
                  <div class="msg-content">${esc(txt)}</div>
                </div>
              `);
              added = true;
            }
          }

          // Deletion support
          const delId = a.markChatItemAsDeletedAction?.targetItemId;
          if (delId) {
            const el = document.getElementById(`msg-${delId}`);
            if (el) {
              el.style.opacity = "0.3";
              el.style.transform = "scale(0.92)";
              setTimeout(() => el.remove(), 800);
            }
          }
        });

        if (added && isBottom) chatbox.scrollTop = chatbox.scrollHeight;
        document.getElementById("msg-count").innerText = seenIds.size;
        updText.innerText = "متصل مباشر (V7) · 1s";
        retryCount = 0;

      } catch (err) {
        retryCount++;
        if (retryCount > 10) { nextCont = null; retryCount = 0; } // Restart config if stuck
        updText.innerText = "إعادة مزامنة...";
      }
    }

    // High performance sync loop
    setInterval(fetchChat, 1500);
    fetchChat();
  </script>
</body>

</html>
